schema: use-case-driven

context: |
  Security-critical Linux filesystem and network sandbox (bubblewrap + strace). See docs/security-model.md.
  Tech: Go, Linux namespaces. Built with CGO_ENABLED=0 (static binary); required because the tunnel runs inside the sandbox where dynamic libraries may not be mounted.
  Arch: CLI → rule resolvers → bwrap wrapper → sandboxed process. Core: config, fsrules, netrules, accesslog, runner, sandbox, monitor, proxy, tunnel, logfilter, textlog. ELF interpreter auto-detected from bwrap's PT_INTERP header and auto-mounted read-only as a managed path (filtered from access log, rejected from user rules).
  Config: TOML format with typed rule sections (fs, net, syscall, env). Default filename: execave.toml. Rules within each section drop the resource type prefix (e.g., fs = ["ro:/usr", "rw:."], env = ["pass:HOME"]). FS rules support tilde expansion (~/... → home dir) and relative paths (resolved against config dir). Env rules: pass:<NAME> forwards a named host env var into the sandbox; default-deny (no host vars enter without an explicit pass rule). CLI flags (--fs, --net, --syscall, --env, --extends, --no-config) provide an alternative or supplement to the TOML file; they flow through the same merge/validate pipeline. CLIRules struct (config package) carries raw rule strings from flags. SourceCLI ("<cli>") and SourceSynthetic ("<synthetic>") are SourcePath sentinel constants used in Config.ConfigPaths and rendered by config show. --no-config skips loading the TOML file entirely. --extends (repeatable) loads base config files relative to cwd.
  Binary validation: bwrap and strace resolved via PATH are validated at startup — Lstat checks root ownership (uid 0) on the path entry itself (blocks symlink injection), Stat checks root ownership and not group/world-writable (mode & 0022 == 0) on the resolved target. Hard error on failure. Both are validated because strace runs outside the sandbox with full host access.
  Version pinning: PinnedBwrapVersion = [3]int{0, 11, 0} (bwrap 0.11.x OK, 0.12+ WARN, <0.11 or ≥1.0 ERROR); PinnedStraceVersion = [2]int{6, 18} (strace 6.18 OK, 6.19+ WARN, <6.18 or ≥7.0 ERROR). CheckBwrapVersion(path) and CheckStraceVersion(path) run after ValidateBinary at each call site (sandbox.Run, runner.buildSandboxedMonitor for bwrap; runner.Start for strace). Return ("", nil) OK, (msg, nil) WARN, ("", err) ERROR.
  Network: Default-deny (no NIC). Forward proxy on UDS + TCP-to-UDS tunnel bridge always starts; HTTP_PROXY/HTTPS_PROXY always injected. Proxy enforces allowlist (deny-all with no net rules).
  Monitoring: --monitor modes: (default=- stderr) =<path> writes text log in real-time; =- buffers to stderr on exit; bare --monitor behaves as --monitor=-. Runner creates fresh access log per run. Paths shortened via logfilter.ShortenPath (relative to config dir or tilde form).
  No-sandbox mode: --no-sandbox (requires --monitor) skips bwrap and seccomp entirely; strace traces the command directly on the host. When netPath is non-nil, a host-side TCP bridge is started and HTTP_PROXY/HTTPS_PROXY/http_proxy/https_proxy injected into the traced process's environment. Env rules are ignored in no-sandbox mode (consistent with other enforcement being skipped). Intended for diagnostic use (observing accesses without confinement). Not a security boundary.
  Filter flags: --show-allowed includes OK entries (default: denied-only). Applied to text log output at startup.
  E2E tests: scenario DSL in test/e2e/helpers_test.go — newScenario(t) creates a builder with dir/file/rule/run/assert methods. testDir named string enables rule concatenation and ~/‑relative paths for monitor assertions.
  LogFilter package (internal/logfilter): shared ShortenPath logic used by textlog.
  TextLog package (internal/textlog): Writer subscribes to accesslog.Logger, filters entries, writes one line per entry. Drains remaining entries on context cancellation.
  Seccomp: ~34 dangerous syscalls blocked by BPF deny-list. Of these, 14 are defense-in-depth only (kernel already prevents them via init-namespace capabilities or removal) and cannot be used in config rules. The remaining ~20 are ruleable. Blocked attempts visible as SYSCALL entries in access log (DENY/no-matching-rule). syscall:allow:<name> removes a ruleable syscall from the BPF filter (security impact: expands kernel attack surface). Note: --monitor uses strace (ptrace), so sandboxed process cannot use ptrace even if syscall:allow:ptrace is configured.

rules:
  proposal:
    - "State security impact: does this change permission checks, rule resolution, sandbox boundaries, config parsing, or bwrap invocation? Explain threat model implications."
    - "Identify affected trust boundaries (user input, config, child processes)."
    - "Consider config format backward compatibility and whether features expand/restrict sandbox."

  playbooks:
    - "Use cases describe end-to-end user interactions with execave. Focus on what the user configures and observes, not internal system behavior."
    - "Include security-relevant use cases: attempts to escape sandbox, access denied files, exfiltrate data."
    - "Every use case must map to an E2E test in test/e2e/."

  specs:
    - "Requirements must be security-verifiable, not vague. Use SHALL for security invariants, MUST for correctness, SHOULD for robustness."
    - "Scenarios must describe observable behavior, not internal operations."
    - "Spec scenarios test a single capability's public API (integration tests), not whole-app behavior. Cover success and security-relevant failures (invalid config, permission denials, malicious input)."
    - "Modifying specs may require test updates."

  design:
    - "Require threat analysis for security decisions: what if this fails?"
    - "Use fail-safe defaults (deny by default, explicit allow lists). Explain auditability."
    - "Map sandbox boundary changes to bwrap/kernel guarantees. Show edge cases for rule changes."
    - "Reference docs/security-model.md, kernel capabilities, bwrap documentation."
    - "Include important implementation details."

  tasks:
    - "[SECURITY] tasks require reading docs/security-model.md first."
    - "E2E tests for new use cases, integration tests for new spec scenarios. If scenarios or use-cases have changed/removed, update corresponding existing tests."
    - "Follow docs/error-handling.md. Config format breaks need migration examples."
    - "When adding fuzz tests or changing code covered by existing ones, run affected fuzz targets for at least 30 seconds to catch regressions."
    - "Modifying use cases requires updating the corresponding E2E tests. Removing a use case requires removing the corresponding E2E test."
