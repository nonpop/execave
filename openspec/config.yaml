schema: use-case-driven

context: |
  Security-critical Linux filesystem and network sandbox (bubblewrap + strace). Bugs enable sandbox escapes or unintended access.
  Tech: Go, Linux namespaces. Domain: Filesystem isolation, network isolation, mount namespaces, rule-based access control. See docs/security-model.md.
  Arch: CLI → rule resolvers → bwrap wrapper → sandboxed process. Core: config, fsrules, netrules, accesslog, runner, sandbox, monitor, proxy, tunnel, webui.
  Config: TOML format. Default filename: execave.toml. FS rules support tilde expansion (~/... → home dir) and relative paths (resolved against config dir).
  Network: Default-deny (no NIC). When net rules present or monitoring enabled: forward proxy on UDS + TCP-to-UDS tunnel bridge. Proxy enforces allowlist (deny-all with no net rules).
  Monitoring: --monitor=PORT starts localhost web UI with real-time access log via SSE and run control (start/stop/restart). Runner manages monitored sandbox lifecycle, creates fresh access log per run. Server survives sandbox exit for log review. Filesystem paths in web UI shortened to relative (vs config dir) or tilde form.

rules:
  proposal:
    - "State security impact: does this change permission checks, rule resolution, sandbox boundaries, config parsing, or bwrap invocation? Explain threat model implications."
    - "Identify affected trust boundaries (user input, config, child processes)."
    - "Consider config format backward compatibility and whether features expand/restrict sandbox."

  playbooks:
    - "Use cases describe end-to-end user interactions with execave. Focus on what the user configures and observes, not internal system behavior."
    - "Include security-relevant use cases: attempts to escape sandbox, access denied files, exfiltrate data."
    - "Every use case must map to an E2E test in test/e2e/."

  specs:
    - "Requirements must be security-verifiable, not vague. Use SHALL for security invariants, MUST for correctness, SHOULD for robustness."
    - "Scenarios must describe observable behavior, not internal operations."
    - "Spec scenarios test a single capability's public API (integration tests), not whole-app behavior. Cover success and security-relevant failures (invalid config, permission denials, malicious input)."
    - "Modifying specs may require test updates."

  design:
    - "Require threat analysis for security decisions: what if this fails?"
    - "Use fail-safe defaults (deny by default, explicit allow lists). Explain auditability."
    - "Map sandbox boundary changes to bwrap/kernel guarantees. Show edge cases for rule changes."
    - "Reference docs/security-model.md, kernel capabilities, bwrap documentation."
    - "Include important implementation details."

  tasks:
    - "[SECURITY] tasks require reading docs/security-model.md first."
    - "E2E tests for new use cases, integration tests for new spec scenarios. If scenarios or use-cases have changed/removed, update corresponding existing tests."
    - "Follow docs/error-handling.md. Config format breaks need migration examples."
    - "When adding fuzz tests or changing code covered by existing ones, run affected fuzz targets for at least 30 seconds to catch regressions."
